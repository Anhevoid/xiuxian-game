<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修仙 · 一念成仙</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">

    <!-- 顶部状态栏 · 角色头部 -->
    <header id="topbar">
      <div class="char">
        <div class="avatar" id="avatar" aria-hidden="true">练</div>
        <div class="char-main">
          <div class="realm" id="realmLabel">练气期初期</div>
          <div class="progress">
            <div class="bar" id="xiuweiBar"></div>
            <span class="progress-text" id="xiuweiText">0 / 100</span>
          </div>
        </div>
      </div>
      <div class="stats">
        <div class="dao-chip" title="道果 · 跨周目元货币（轮回转世获得，点亮轮回天赋）"><span class="dao-icon" aria-hidden="true">💎</span><b id="daoFruitText">0</b></div>
        <div class="luck-chip" id="luckChip" title="气运 · 影响突破/炼丹/掉落概率（卜卦消耗）"><span aria-hidden="true">🍀</span><b id="luckText">50</b></div>
        <div class="lingshi-chip"><span class="gem-icon" aria-hidden="true"></span><b id="lingshiText">0</b></div>
        <div class="hp-chip">
          <span class="hp-icon">❤️</span>
          <b id="hpText">100/100</b>
          <div class="hpbar"><div class="bar" id="hpBar"></div></div>
        </div>
        <span id="debugBadge" class="debug-badge hidden">测试模式</span>
        <button class="debug-toggle" id="debugToggle" title="测试面板 (Ctrl+Shift+D)">⚙️</button>
      </div>
    </header>

    <main>
      <!-- 左：洞府修炼 -->
      <section class="cult-panel">
        <h2>🏔 洞府</h2>
        <div class="cult-info">
          <p>修炼速度：<b id="cultRateText">2/秒</b></p>
          <p>当前修为：<b id="xiuweiText2">0</b></p>
          <p id="herbProdLine" class="hidden">🌿 灵田产出：<b id="herbProdText">0</b>/分</p>
        </div>
        <button id="meditateBtn" class="big-btn meditate">🧘 打坐吐纳 <small>(空格)</small></button>
        <button id="breakBtn" class="big-btn break">✨ 突破境界</button>
        <div class="attrs">
          <span>⚔️ 攻 <b id="atkText">8</b></span>
          <span>🛡️ 防 <b id="defText">4</b></span>
        </div>
        <div class="tech-line">📕 功法：<b id="techText">无</b></div>
        <div class="tech-line">📿 法宝：<b id="treasureText">无</b></div>
        <div id="debuffLine" class="debuff-line hidden"></div>
        <button id="reincarnArmyBtn" class="big-btn reincarn hidden">💀 兵解轮回 <small>(渡劫期主动轮回)</small></button>
      </section>

      <!-- 右：功能标签 -->
      <section class="tab-panel">
        <nav class="tabs">
          <button class="tab active" data-tab="zone">⚔️ 秘境</button>
          <button class="tab" data-tab="shop">🏪 集市</button>
          <button class="tab" data-tab="alchemy">⚗️ 炼丹</button>
          <button class="tab" data-tab="inventory">🎒 行囊</button>
          <button class="tab" data-tab="sect">🏯 宗门</button>
          <button class="tab" data-tab="cave">🏘 仙府</button>
          <button class="tab" data-tab="pet">🐾 灵宠</button>
          <button class="tab" data-tab="duel">⚔️ 论道</button>
        </nav>
        <div id="tabContent"></div>
      </section>
    </main>

    <!-- 底部日志 -->
    <footer id="logPanel">
      <div class="log-title">🎐 仙途纪事</div>
      <div id="log"></div>
    </footer>
  </div>

  <!-- 飞升胜利遮罩 -->
  <div id="victory" class="overlay hidden">
    <div class="modal">
      <h1>🌅 飞升成仙</h1>
      <p id="victoryText"></p>
      <div class="modal-btns">
        <button id="reincarnBtn">🔄 轮回转世</button>
        <button id="restartBtn" class="secondary">💥 散功重修</button>
      </div>
    </div>
  </div>

  <!-- 轮回天赋树遮罩（点击顶栏道果徽章打开） -->
  <div id="samsakaTree" class="overlay hidden">
    <div class="modal samsaka-modal">
      <div class="samsaka-modal-head">
        <h2>🌟 轮回天赋树</h2>
        <button class="dbg-close" id="samsakaClose" title="关闭">✕</button>
      </div>
      <div id="samsakaTreeBody"></div>
    </div>
  </div>

  <!-- 奇遇事件遮罩（模块 E） -->
  <div id="eventOverlay" class="overlay hidden">
    <div class="modal event-modal">
      <div id="eventBody"></div>
    </div>
  </div>

  <!-- 卜卦/因果遮罩（模块 G） -->
  <div id="divineOverlay" class="overlay hidden">
    <div class="modal event-modal">
      <div class="divine-head">
        <h2>🍀 卜卦台 · 因果</h2>
        <button class="dbg-close" id="divineClose" title="关闭">✕</button>
      </div>
      <div id="divineBody"></div>
    </div>
  </div>

  <!-- 道途选择遮罩（模块 H，元婴期强制） -->
  <div id="daoChoose" class="overlay hidden">
    <div class="modal event-modal">
      <div class="divine-head"><h2>🌟 道途抉择</h2></div>
      <p class="alch-note" style="text-align:center;margin-bottom:12px">突破元婴，需择一道途，影响此世加成与结局。</p>
      <div id="daoChooseBody"></div>
    </div>
  </div>

  <!-- 九重天劫遮罩（模块 B） -->
  <div id="tribulation" class="overlay hidden">
    <div class="modal event-modal">
      <div id="tribBody"></div>
    </div>
  </div>

  <!-- 调试/测试面板（仅供调试，会话级，不影响存档） -->
  <div id="debugPanel" class="hidden">
    <div class="dbg-head">
      <span>🛠 测试面板（仅供调试）</span>
      <button class="dbg-close" id="dbgClose" title="关闭">✕</button>
    </div>
    <div class="dbg-body">
      <div class="dbg-section">
        <div class="dbg-label">修为</div>
        <div class="dbg-row">
          <button class="dbg-btn" data-action="dbg-xiuwei-fill">填满至需求</button>
          <button class="dbg-btn" data-action="dbg-xiuwei-10x">+10倍需求</button>
        </div>
      </div>
      <div class="dbg-section">
        <div class="dbg-label">灵石</div>
        <div class="dbg-row">
          <button class="dbg-btn" data-action="dbg-lingshi-1m">+100万</button>
          <button class="dbg-btn" data-action="dbg-lingshi-10x">×10</button>
        </div>
      </div>
      <div class="dbg-section">
        <div class="dbg-label">境界 (0-35)</div>
        <div class="dbg-row">
          <button class="dbg-btn" data-action="dbg-sub-minus">-1</button>
          <button class="dbg-btn" data-action="dbg-sub-plus">+1</button>
          <input type="number" id="dbgSubInput" class="dbg-input" min="0" max="35" value="0">
          <button class="dbg-btn" data-action="dbg-sub-set">设置</button>
        </div>
      </div>
      <div class="dbg-section">
        <div class="dbg-row">
          <button class="dbg-btn" data-action="dbg-maxhp">满血</button>
          <button class="dbg-btn" data-action="dbg-give-items">材料丹药+10</button>
        </div>
        <div class="dbg-row">
          <button class="dbg-btn" data-action="dbg-unlock-zones">解锁秘境</button>
          <button class="dbg-btn" data-action="dbg-insta-break">一键突破</button>
        </div>
        <div class="dbg-row">
          <button class="dbg-btn" data-action="dbg-godmode" id="dbgGodBtn">无敌：关</button>
          <button class="dbg-btn danger" data-action="dbg-reset">散功重修</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
